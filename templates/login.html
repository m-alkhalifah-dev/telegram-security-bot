<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Security Bot Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card p-4" style="width:360px">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-success" style="font-size:3rem"></i>
      <h4 class="mt-2 text-success fw-bold">SecBot Dashboard</h4>
      <small class="text-muted">Raspberry Pi Security Monitor</small>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label text-muted small">Username</label>
        <input type="text" name="username" class="form-control bg-dark border-secondary text-light"
               placeholder="admin" autocomplete="username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small">Password</label>
        <input type="password" name="password" class="form-control bg-dark border-secondary text-light"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-success w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
