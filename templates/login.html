<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — SecBot SOC</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body d-flex align-items-center justify-content-center min-vh-100">

<!-- Animated background grid -->
<div class="login-grid-bg"></div>

<div class="login-container">
  <!-- Logo -->
  <div class="text-center mb-4">
    <div class="login-logo mb-3">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h4 class="text-success fw-bold mb-1">Security Operations Center</h4>
    <p class="text-muted small">Telegram Security Bot Dashboard</p>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} border-0 rounded-3 mb-3 small">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Login card -->
  <div class="login-card p-4">
    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0">
            <i class="bi bi-person text-success"></i>
          </span>
          <input type="text" name="username" class="form-control border-start-0 ps-0"
                 placeholder="admin" autocomplete="username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0">
            <i class="bi bi-lock text-success"></i>
          </span>
          <input type="password" name="password" class="form-control border-start-0 ps-0"
                 placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-success w-100 fw-bold py-2">
        <i class="bi bi-shield-check me-2"></i>Access Dashboard
      </button>
    </form>
  </div>

  <p class="text-center text-muted small mt-4">
    <i class="bi bi-lock-fill me-1"></i>Secured access only
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
